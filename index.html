<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chichi Barber — Reservas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   RESET & VARIABLES
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #060606;
  --ink:     #0e0e0e;
  --panel:   #141414;
  --surface: #1c1c1c;
  --line:    rgba(255,255,255,0.07);
  --gold:    #c9a84c;
  --gold2:   #f0cc72;
  --dim:     rgba(201,168,76,0.12);
  --red:     #c0392b;
  --red2:    #e74c3c;
  --green:   #1fa85a;
  --white:   #f5f5f0;
  --muted:   rgba(245,245,240,0.35);
  --wa:      #25D366;
}

body {
  min-height: 100vh;
  background: var(--black);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 48px;
  font-family: 'Barlow', sans-serif;
  color: var(--white);
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ─────────────────────────────────────────
   MASTHEAD
───────────────────────────────────────── */
.masthead {
  width: 100%;
  max-width: 480px;
  padding: 28px 24px 0;
  display: flex;
  flex-direction: column;
}

.masthead-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.brand-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
}

.brand-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1;
}

.brand-name em { color: var(--gold); font-style: normal; }

.scissors-icon {
  width: 40px; height: 40px;
  background: var(--dim);
  border: 1px solid rgba(201,168,76,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.gold-rule {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), rgba(201,168,76,0.1));
}

/* ─────────────────────────────────────────
   STATUS BAR
───────────────────────────────────────── */
.status-bar {
  width: 100%;
  max-width: 480px;
  background: var(--ink);
  border-left: 2px solid var(--gold);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 2px;
}

.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status-dot.verde { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.dorado { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

.status-text { display: flex; flex-direction: column; flex: 1; }
.status-kicker { font-size: 0.55rem; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); }
.status-main { font-family: 'Barlow Condensed'; font-size: 0.95rem; font-weight: 700; text-transform: uppercase; }
.status-main.verde { color: var(--green); }
.status-main.dorado { color: var(--gold); }

.btn-refresh {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ─────────────────────────────────────────
   MAIN CARD
───────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 480px;
  background: var(--panel);
  border: 1px solid var(--line);
  padding: 24px 20px 28px;
}

.sec { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.sec-label { font-family: 'Barlow Condensed'; font-size: 0.62rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
.sec-line { flex: 1; height: 1px; background: var(--line); }

.input-nombre {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 13px 14px;
  color: var(--white);
  font-family: 'Barlow';
  margin-bottom: 22px;
  outline: none;
}

.dias-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 22px; }
.dia-cell {
  display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px;
  background: var(--surface); border: 1px solid var(--line); cursor: pointer;
}
.dia-cell.dia-active { background: var(--gold); border-color: var(--gold); color: black; }
.dia-dow { font-size: 0.58rem; text-transform: uppercase; font-weight: 700; color: var(--muted); }
.dia-num { font-size: 1.3rem; font-weight: 900; font-family: 'Barlow Condensed'; }
.dia-active .dia-dow, .dia-active .dia-num { color: black; }

.horas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 20px; }
.hora-cell {
  padding: 13px 4px 11px; background: var(--surface); border: 1px solid var(--line);
  text-align: center; cursor: pointer; position: relative;
}
.hora-cell.hora-selected { background: var(--gold); border-color: var(--gold); }
.hora-cell.hora-selected .hora-time { color: black; }
.hora-cell.hora-ocupado { background: rgba(192,57,43,0.15); border-color: rgba(231,76,60,0.3); cursor: not-allowed; opacity: 0.7; }
.hora-time { font-family: 'Barlow Condensed'; font-weight: 800; font-size: 0.95rem; }

.btn-confirmar {
  width: 100%; padding: 16px; background: var(--gold); color: black; border: none;
  font-family: 'Barlow Condensed'; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
}
.btn-confirmar:disabled { background: var(--surface); color: rgba(255,255,255,0.1); cursor: not-allowed; }

/* ─────────────────────────────────────────
   AGENDA CARD
───────────────────────────────────────── */
.agenda-card {
  width: 100%; max-width: 480px; background: var(--panel);
  border: 1px solid var(--line); border-top: 2px solid var(--gold); margin-top: 6px;
}
.agenda-header { padding: 14px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--line); }
.agenda-title { font-size: 0.62rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
.agenda-row { display: flex; padding: 10px 20px; gap: 15px; border-bottom: 1px solid var(--line); align-items: center; }
.agenda-hora { font-weight: 800; color: var(--gold); background: var(--dim); padding: 3px 8px; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-top">
    <div class="brand">
      <span class="brand-eyebrow">Agenda tu turno</span>
      <span class="brand-name">Chichi <em>Barber</em></span>
    </div>
    <div class="scissors-icon">✂️</div>
  </div>
  <div class="gold-rule"></div>
</div>

<div class="status-bar">
  <div class="status-dot verde" id="statusDot"></div>
  <div class="status-text">
    <span class="status-kicker">Estado del barbero</span>
    <span class="status-main verde" id="statusMain">Sincronizando...</span>
  </div>
  <button class="btn-refresh" onclick="fetchCSV()">🔄</button>
</div>

<div class="card">
  <div class="sec"><span class="sec-label">Cliente</span><div class="sec-line"></div></div>
  <input type="text" id="nombreCli" class="input-nombre" placeholder="Nombre y apellido">
  
  <div class="sec"><span class="sec-label">Día</span><div class="sec-line"></div></div>
  <div class="dias-strip" id="gridDias"></div>
  
  <div class="sec"><span class="sec-label">Horario</span><div class="sec-line"></div></div>
  <div class="horas-grid" id="gridHoras"></div>
  
  <button class="btn-confirmar" id="btnConfirmar" disabled onclick="enviarCita()">Confirmar Reserva</button>
</div>

<div class="agenda-card">
  <div class="agenda-header">
    <span class="agenda-title">Agenda confirmada</span>
    <span id="agendaCount" style="font-size: 0.7rem; font-weight: 700; color: var(--muted);"></span>
  </div>
  <div id="agendaList"></div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQX9jO8I1qUAJ3PXGOr1_GeUmLhd3cGiYfMjXC5ZFjo1-qkZPcElNBNsNMGnCYcWhTkCjSZWHN6Ngw/pub?output=csv";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9MV6DAPhWpax-uPzvCfutxJ01Mg3MZjTnVYaEbIhKyFebkaeYseURZJnLugxOGTGI/exec";
  const TURNOS = ["11 AM","12 PM","1 PM","2 PM","3 PM","4 PM","5 PM","6 PM","7 PM","8 PM","9 PM","10 PM","11 PM"];

  let baseDatos = [];
  let fechaSel = "";
  let horaSel = "";

  function hoyVE() {
    const d = new Date(new Date().getTime() + new Date().getTimezoneOffset() * 60000 - 4 * 3600000);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Normalizador específico para formato Año-Mes-Día
  function normFecha(str) {
    if (!str) return "";
    const limpio = str.trim().replace(/"/g, '');
    const partes = limpio.split(/[\/\-]/);
    if (partes.length < 3) return "";

    let y, m, d;
    // Si el primer segmento tiene 4 dígitos, asumimos YYYY-MM-DD
    if (partes[0].length === 4) {
      y = partes[0];
      m = partes[1].padStart(2, '0');
      d = partes[2].padStart(2, '0');
    } else {
      // Si no, asumimos DD-MM-YYYY
      y = partes[2];
      m = partes[1].padStart(2, '0');
      d = partes[0].padStart(2, '0');
    }
    return `${y}-${m}-${d}`;
  }

  async function fetchCSV() {
    try {
      const r = await fetch(CSV_URL + "&t=" + Date.now());
      const t = await r.text();
      const filas = t.split(/\r?\n/).slice(1);
      
      baseDatos = filas.map(f => {
        const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if (c.length < 3) return null;
        return { 
          hora: c[0].replace(/"/g,'').trim(), 
          nombre: c[1].replace(/"/g,'').trim(), 
          fecha: normFecha(c[2]) 
        };
      }).filter(x => x !== null && x.hora);

      updateStatus(); 
      renderHoras(); 
      renderAgenda();
    } catch(e) { console.error("Error CSV", e); }
  }

  function buildDias() {
    const grid = document.getElementById('gridDias');
    grid.innerHTML = "";
    const hoyS = hoyVE();
    fechaSel = hoyS;
    for(let i=0; i<7; i++){
      const d = new Date(); d.setDate(d.getDate() + i);
      if(d.getDay() === 0) continue;
      const fs = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const el = document.createElement('div');
      el.className = 'dia-cell' + (fs === hoyS ? ' dia-active' : '');
      el.innerHTML = `<span class="dia-dow">${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()]}</span><span class="dia-num">${d.getDate()}</span>`;
      el.onclick = () => {
        document.querySelectorAll('.dia-cell').forEach(c => c.classList.remove('dia-active'));
        el.classList.add('dia-active'); 
        fechaSel = fs; horaSel = ""; 
        renderHoras(); renderAgenda();
      };
      grid.appendChild(el);
    }
  }

  function renderHoras() {
    const grid = document.getElementById('gridHoras'); grid.innerHTML = "";
    const ocupHoy = baseDatos.filter(b => b.fecha === fechaSel);
    TURNOS.forEach(t => {
      const cita = ocupHoy.find(o => o.hora === t);
      const el = document.createElement('div');
      el.className = 'hora-cell' + (cita ? ' hora-ocupado' : '');
      el.innerHTML = `<span class="hora-time">${t}</span>`;
      if(!cita) {
        el.onclick = () => {
          document.querySelectorAll('.hora-cell').forEach(c => c.classList.remove('hora-selected'));
          el.classList.add('hora-selected'); horaSel = t; validar();
        };
      } else {
        el.innerHTML += `<br><span style="font-size:9px; color:var(--gold); display:block; margin-top:2px;">${cita.nombre}</span>`;
      }
      grid.appendChild(el);
    });
  }

  function renderAgenda() {
    const list = document.getElementById('agendaList'); list.innerHTML = "";
    const citas = baseDatos.filter(b => b.fecha === fechaSel);
    document.getElementById('agendaCount').textContent = citas.length + " turnos";
    if(citas.length === 0) {
      list.innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted); font-size:12px;">SIN CITAS</div>';
    }
    citas.forEach(c => {
      list.innerHTML += `<div class="agenda-row"><span class="agenda-hora">${c.hora}</span><span>${c.nombre}</span></div>`;
    });
  }

  function updateStatus() {
    const main = document.getElementById('statusMain');
    const dot = document.getElementById('statusDot');
    const d = new Date(new Date().getTime() + new Date().getTimezoneOffset() * 60000 - 4 * 3600000);
    let h = d.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    const horaTxt = `${h} ${ampm}`;
    const cita = baseDatos.find(b => b.hora === horaTxt && b.fecha === hoyVE());
    if(cita) {
      main.textContent = `Atendiendo a: ${cita.nombre.toUpperCase()}`;
      main.className = 'status-main dorado'; dot.className = 'status-dot dorado';
    } else {
      main.textContent = 'Disponible ahora';
      main.className = 'status-main verde'; dot.className = 'status-dot verde';
    }
  }

  function validar() {
    document.getElementById('btnConfirmar').disabled = !(document.getElementById('nombreCli').value.trim().length > 2 && horaSel);
  }

  async function enviarCita() {
    const nombre = document.getElementById('nombreCli').value.trim();
    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true; btn.textContent = "REGISTRANDO...";
    const params = new URLSearchParams();
    params.append('nombre', nombre); params.append('hora', horaSel); params.append('fecha', fechaSel);
    try {
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
      setTimeout(() => {
        const [y, m, d] = fechaSel.split('-');
        const txt = `¡Hola Chichi Barber! 💈 Reservé mi turno:\n\n👤 ${nombre}\n📅 ${d}/${m}/${y}\n🕐 ${horaSel}`;
        window.open(`https://wa.me/584246783781?text=${encodeURIComponent(txt)}`, '_blank');
        location.reload();
      }, 800);
    } catch(e) { btn.disabled = false; btn.textContent = "Confirmar Reserva"; }
  }

  document.getElementById('nombreCli').oninput = validar;
  buildDias(); 
  fetchCSV();
  setInterval(fetchCSV, 30000);
</script>

</body>
</html>
