<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chichi Barber — Reservas Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --dark: #121212;
    --gold: #c9a84c;
    --border: rgba(255, 255, 255, 0.1);
    --green: #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 15px; }

  .card { width: 100%; max-width: 420px; background: var(--dark); border: 1px solid var(--border); padding: 25px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  .status-bar { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 2px; margin-bottom: 20px; border-left: 3px solid var(--gold); }
  .pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

  .label-sq { font-size: 10px; text-transform: uppercase; color: var(--gold); font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; display: block; }

  .input-sq { width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 14px; color: white; margin-bottom: 20px; border-radius: 2px; font-family: 'Inter'; font-size: 14px; }
  .input-sq:focus { border-color: var(--gold); outline: none; background: #222; }

  .dias-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; scrollbar-width: none; }
  .dia-item { min-width: 62px; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.2s; border-radius: 2px; }
  .dia-item.active { background: var(--gold); color: black; border-color: var(--gold); }
  .dia-item span { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .dia-item b { font-size: 18px; font-family: 'Oswald'; }

  .horas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 25px; }
  .hora-sq { padding: 15px 5px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; font-weight: 700; cursor: pointer; border-radius: 2px; font-size: 12px; transition: 0.2s; }
  .hora-sq:hover:not(.ocupado) { border-color: var(--gold); }
  .hora-sq.selected { background: var(--gold); color: black; border-color: var(--gold); }
  .hora-sq.ocupado { opacity: 0.1; cursor: not-allowed; border-color: transparent; text-decoration: line-through; }

  .btn-main { width: 100%; padding: 18px; background: var(--gold); color: black; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-family: 'Oswald'; letter-spacing: 1px; transition: 0.3s; }
  .btn-main:disabled { background: #333; color: #666; cursor: not-allowed; }

  .citas-hoy { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 15px; }
  .cita-row { display: flex; justify-content: space-between; font-size: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
</style>
</head>
<body>

<div class="card">
  <div class="status-bar">
    <div class="pulse" id="dotStatus"></div>
    <div>
      <p style="font-size: 9px; opacity: 0.5; text-transform: uppercase;">Estado del Barbero</p>
      <p id="statusDesc" style="font-size: 13px; font-weight: 700; color: var(--green);">Sincronizando...</p>
    </div>
  </div>

  <h2 style="font-family: 'Oswald'; text-align: center; margin-bottom: 25px; letter-spacing: 2px;">CHICHI BARBER</h2>

  <label class="label-sq">Nombre del Cliente</label>
  <input type="text" id="nombreCli" class="input-sq" placeholder="ESCRIBE AQUÍ...">

  <label class="label-sq">Selecciona el día</label>
  <div class="dias-grid" id="gridDias"></div>

  <label class="label-sq">Horas disponibles</label>
  <div class="horas-grid" id="gridHoras"></div>

  <button id="btnConfirmar" class="btn-main" disabled onclick="enviarCita()">Confirmar Reserva</button>

  <div class="citas-hoy">
    <label class="label-sq">Agenda confirmada</label>
    <div id="listaCitas"></div>
  </div>
</div>

<script>
  // CONFIGURACIÓN DE CONEXIÓN
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQX9jO8I1qUAJ3PXGOr1_GeUmLhd3cGiYfMjXC5ZFjo1-qkZPcElNBNsNMGnCYcWhTkCjSZWHN6Ngw/pub?output=csv";
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby9MV6DAPhWpax-uPzvCfutxJ01Mg3MZjTnVYaEbIhKyFebkaeYseURZJnLugxOGTGI/exec";

  let baseDeDatos = [];
  let fechaSel = "";
  let horaSel = "";

  function init() {
    const cont = document.getElementById('gridDias');
    const diasSemana = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const hoy = new Date();
    
    for(let i=0; i<7; i++) {
      let d = new Date();
      d.setDate(hoy.getDate() + i);
      let iso = d.toISOString().split('T')[0];
      if(i===0) fechaSel = iso;

      let el = document.createElement('div');
      el.className = `dia-item ${i===0 ? 'active' : ''}`;
      el.innerHTML = `<span>${diasSemana[d.getDay()]}</span><b>${d.getDate()}</b>`;
      el.onclick = () => {
        document.querySelectorAll('.dia-item').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        fechaSel = iso;
        horaSel = "";
        render();
      };
      cont.appendChild(el);
    }
    fetchData();
  }

  async function fetchData() {
    try {
      const r = await fetch(CSV_URL + "&cache=" + new Date().getTime());
      const t = await r.text();
      const filas = t.split("\n").slice(1);
      
      baseDeDatos = filas.map(f => {
        const c = f.split(",");
        let fRaw = (c[2] || "").trim().split(" ")[0]; 
        fRaw = fRaw.replace(/\//g, "-");

        const p = fRaw.split("-");
        if(p.length === 3 && p[0].length <= 2) {
           fRaw = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
        }
        
        return { 
          hora: (c[0] || "").trim(), 
          nombre: (c[1] || "").trim(), 
          fecha: fRaw 
        };
      }).filter(x => x.hora);

      render();
      updateStatus();
    } catch(e) {
      console.error("Error CSV:", e);
    }
  }

  function updateStatus() {
    const st = document.getElementById('statusDesc');
    const dot = document.getElementById('dotStatus');
    const ahora = new Date();
    const hoyISO = ahora.toISOString().split('T')[0];
    
    // Obtener hora actual redondeada al turno (Ej: 14:58 -> 2 PM)
    let h = ahora.getHours();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    h = h ? h : 12; 
    const horaActualTexto = `${h} ${ampm}`;

    const citaAhora = baseDeDatos.find(b => b.fecha === hoyISO && b.hora === horaActualTexto);

    if (citaAhora) {
        st.innerText = `OCUPADO: ${citaAhora.nombre.toUpperCase()}`;
        st.style.color = "var(--gold)";
        dot.style.background = "var(--gold)";
    } else {
        st.innerText = "DISPONIBLE EN ESTE MOMENTO";
        st.style.color = "var(--green)";
        dot.style.background = "var(--green)";
    }
  }

  function render() {
    const hCont = document.getElementById('gridHoras');
    const lCont = document.getElementById('listaCitas');
    hCont.innerHTML = "";
    lCont.innerHTML = "";

    const turnos = ["11 AM", "12 PM", "1 PM", "2 PM", "3 PM", "4 PM", "5 PM", "6 PM", "7 PM", "8 PM", "9 PM", "10 PM"];
    const ocupados = baseDeDatos.filter(b => b.fecha === fechaSel);

    turnos.forEach(t => {
      const cita = ocupados.find(o => o.hora === t);
      const b = document.createElement('button');
      b.className = `hora-sq ${cita ? 'ocupado' : ''}`;
      b.innerText = t;

      if(!cita) {
        b.onclick = () => {
          document.querySelectorAll('.hora-sq').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          horaSel = t;
          validar();
        };
      } else {
        b.disabled = true;
        lCont.innerHTML += `<div class="cita-row"><b style="color:var(--gold)">${t}</b><span>${cita.nombre}</span></div>`;
      }
      hCont.appendChild(b);
    });

    if(!lCont.innerHTML) lCont.innerHTML = "<p style='font-size:10px; opacity:0.3; text-align:center'>No hay citas registradas.</p>";
  }

  function validar() {
    const n = document.getElementById('nombreCli').value;
    document.getElementById('btnConfirmar').disabled = !(n.length > 2 && horaSel);
  }

  function enviarCita() {
    const btn = document.getElementById('btnConfirmar');
    const nombre = document.getElementById('nombreCli').value;
    btn.innerText = "REGISTRANDO...";
    btn.disabled = true;

    const datos = new FormData();
    datos.append('nombre', nombre);
    datos.append('hora', horaSel);
    datos.append('fecha', fechaSel);

    fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: datos })
    .then(() => {
        btn.innerText = "¡RESERVADO!";
        btn.style.background = "var(--green)";
        setTimeout(() => {
            const wa = `https://wa.me/584246783781?text=Confirmo cita: ${nombre} - ${fechaSel} a las ${horaSel}`;
            window.open(wa, '_blank');
            location.reload();
        }, 1200);
    });
  }

  document.getElementById('nombreCli').oninput = validar;
  init();
  setInterval(fetchData, 60000); 
</script>
</body>
</html>
