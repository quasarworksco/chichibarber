<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chichi Barber — Reservas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:  #0a0a0a;
    --dark:   #1a1a1a;
    --gold:   #c9a84c;
    --gold2:  #e8c96d;
    --red:    #c0392b;
    --red2:   #e74c3c;
    --green:  #27ae60;
    --white:  #ffffff;
    --wa:     #25D366;
    --wa2:    #1ebe5d;
  }

  body {
    min-height: 100vh;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    font-family: 'DM Sans', sans-serif;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
  }

  .card {
    background: var(--dark);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 24px;
    width: 100%;
    max-width: 440px;
    padding: 0 0 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── BANNER ── */
  #bannerAtencion {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: all 0.4s ease;
  }

  #bannerAtencion.disponible { background: rgba(39,174,96,0.08); }
  #bannerAtencion.atendiendo { background: rgba(201,168,76,0.09); }

  .banner-pulse {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .banner-pulse::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    animation: pulse 1.8s ease-out infinite;
  }

  .disponible .banner-pulse { background: var(--green); }
  .disponible .banner-pulse::after { border: 1.5px solid var(--green); }
  .atendiendo .banner-pulse { background: var(--gold); }
  .atendiendo .banner-pulse::after { border: 1.5px solid var(--gold); }

  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.8; }
    70%  { transform: scale(2.2); opacity: 0;   }
    100% { transform: scale(1);   opacity: 0;   }
  }

  .banner-texto { display: flex; flex-direction: column; gap: 1px; }

  .banner-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .disponible .banner-label { color: var(--green); }
  .atendiendo .banner-label { color: var(--gold); }

  .banner-nombre { font-size: 1rem; font-weight: 600; font-family: 'Playfair Display', serif; }
  .disponible .banner-nombre { color: rgba(255,255,255,0.6); font-style: italic; font-weight: 400; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; }
  .atendiendo .banner-nombre { color: var(--white); }

  /* ── Header ── */
  .header { padding: 28px 32px 0; }

  .icon-wrap {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 20px;
    box-shadow: 0 6px 20px rgba(201,168,76,0.3);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--white);
    text-align: center;
    letter-spacing: -0.5px;
  }

  h1 span {
    display: block;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 3.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .divider {
    width: 36px; height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    margin: 14px auto 22px;
  }

  .body { padding: 0 32px; }

  /* ── Input nombre ── */
  .input-wrap { position: relative; margin-bottom: 16px; }

  .input-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
  }

  .input-field {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--white);
    font-size: 0.93rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .input-field::placeholder { color: rgba(255,255,255,0.28); }
  .input-field:focus { border-color: var(--gold); background: rgba(201,168,76,0.06); }

  /* ── Selector de fecha ── */
  .fecha-wrap {
    position: relative;
    margin-bottom: 22px;
  }

  .fecha-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
  }

  #fechaSeleccionada {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--white);
    font-size: 0.93rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    /* Fix color picker en navegadores oscuros */
    color-scheme: dark;
  }

  #fechaSeleccionada:focus { border-color: var(--gold); background: rgba(201,168,76,0.06); }

  .fecha-badge {
    display: inline-block;
    margin-bottom: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .section-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 11px;
  }

  /* ── Leyenda ── */
  .leyenda {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .leyenda-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.4);
  }

  .leyenda-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .leyenda-dot.libre    { background: rgba(255,255,255,0.25); }
  .leyenda-dot.ocupado  { background: var(--red2); }
  .leyenda-dot.almuerzo { background: rgba(255,255,255,0.1); }

  /* ── Grid horas ── */
  #contenedorHoras {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 22px;
  }

  .hora-btn {
    padding: 14px 10px 12px;
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    text-align: center;
    font-size: 0.87rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.72);
    user-select: none;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(5px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .hora-btn:hover:not(.ocupado):not(.almuerzo):not(.seleccionado) {
    border-color: rgba(201,168,76,0.45);
    background: rgba(201,168,76,0.07);
    color: var(--white);
    transform: translateY(-1px);
  }

  .hora-btn.seleccionado {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--black);
    border-color: transparent;
    font-weight: 700;
    box-shadow: 0 4px 18px rgba(201,168,76,0.38);
    transform: translateY(-1px);
  }

  /* OCUPADO — rojo llamativo */
  .hora-btn.ocupado {
    background: rgba(192,57,43,0.18);
    border-color: rgba(231,76,60,0.5);
    color: rgba(231,76,60,0.9);
    cursor: not-allowed;
    box-shadow: 0 0 10px rgba(192,57,43,0.15);
    position: relative;
    overflow: hidden;
  }

  .hora-btn.ocupado::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), var(--red2));
  }

  .hora-btn.ocupado .hora-text {
    text-decoration: line-through;
    text-decoration-color: rgba(231,76,60,0.6);
  }

  .hora-btn.ocupado .tag {
    display: block;
    font-size: 0.58rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(231,76,60,0.7);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* ALMUERZO — gris neutro */
  .hora-btn.almuerzo {
    background: rgba(255,255,255,0.02);
    border-color: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.18);
    cursor: not-allowed;
  }

  .hora-btn.almuerzo .hora-text { text-decoration: none; }
  .hora-btn.almuerzo .tag { color: rgba(255,255,255,0.18); }

  .cargando {
    grid-column: span 2;
    text-align: center;
    color: rgba(255,255,255,0.28);
    font-size: 0.87rem;
    padding: 24px 0;
  }

  /* ── Botón confirmar ── */
  #btnReservar {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--black);
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.93rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.4px;
    box-shadow: 0 4px 20px rgba(201,168,76,0.28);
  }

  #btnReservar:disabled {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.22);
    cursor: not-allowed;
    box-shadow: none;
  }

  #btnReservar:not(:disabled):hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,168,76,0.42);
  }

  /* ── Botón WhatsApp ── */
  #btnWhatsapp {
    display: none;
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--wa), var(--wa2));
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.93rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.4px;
    box-shadow: 0 4px 20px rgba(37,211,102,0.28);
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin-top: 10px;
    text-decoration: none;
    text-align: center;
  }

  #btnWhatsapp.visible { display: flex; animation: fadeUp 0.35s ease both; }
  #btnWhatsapp:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.42); }

  /* ── Mensaje estado ── */
  #msgEstado {
    margin-top: 13px;
    min-height: 16px;
    font-size: 0.86rem;
    text-align: center;
    border-radius: 10px;
    transition: all 0.25s;
    padding: 0;
  }

  #msgEstado.visible { padding: 11px 14px; }
  #msgEstado.ok    { background: rgba(39,174,96,0.1);  color: #2ecc71; border: 1px solid rgba(39,174,96,0.2); }
  #msgEstado.error { background: rgba(192,57,43,0.12); color: #e74c3c; border: 1px solid rgba(192,57,43,0.25); }
  #msgEstado.info  { background: rgba(201,168,76,0.08); color: var(--gold); border: 1px solid rgba(201,168,76,0.15); }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid rgba(0,0,0,0.25);
    border-top-color: var(--black);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ── LISTA DE CITAS ── */
  .citas-card {
    background: var(--dark);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 24px;
    width: 100%;
    max-width: 440px;
    margin-top: 16px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    position: relative;
  }

  .citas-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .citas-header {
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .citas-titulo {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .citas-badge {
    background: rgba(201,168,76,0.12);
    color: var(--gold);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .citas-lista {
    list-style: none;
    padding: 8px 0;
    max-height: 320px;
    overflow-y: auto;
  }

  .citas-lista::-webkit-scrollbar { width: 4px; }
  .citas-lista::-webkit-scrollbar-track { background: transparent; }
  .citas-lista::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 4px; }

  .cita-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: fadeUp 0.3s ease both;
    transition: background 0.15s;
  }

  .cita-item:last-child { border-bottom: none; }
  .cita-item:hover { background: rgba(255,255,255,0.02); }

  .cita-num { font-size: 0.65rem; font-weight: 700; color: rgba(201,168,76,0.4); width: 18px; text-align: center; flex-shrink: 0; }

  .cita-hora {
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid rgba(201,168,76,0.18);
    flex-shrink: 0;
    min-width: 54px;
    text-align: center;
  }

  .cita-nombre { font-size: 0.9rem; font-weight: 500; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .citas-vacio { padding: 28px 24px; text-align: center; color: rgba(255,255,255,0.2); font-size: 0.85rem; font-style: italic; }
  .citas-cargando { padding: 28px 24px; text-align: center; color: rgba(255,255,255,0.25); font-size: 0.85rem; }

  .spinner-gold {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 7px;
  }

  /* Debug panel (oculto por defecto) */
  #debugPanel {
    display: none;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    max-height: 200px;
    overflow-y: auto;
    width: 100%;
    max-width: 440px;
  }
</style>
</head>
<body>

<!-- CARD PRINCIPAL -->
<div class="card">

  <div id="bannerAtencion" class="disponible">
    <div class="banner-pulse"></div>
    <div class="banner-texto">
      <span class="banner-label" id="bannerLabel">En este momento</span>
      <span class="banner-nombre" id="bannerNombre">Cargando...</span>
    </div>
  </div>

  <div class="header">
    <div class="icon-wrap">✂️</div>
    <h1>
      <span>Agenda tu turno</span>
      Chichi Barber
    </h1>
    <div class="divider"></div>
  </div>

  <div class="body">

    <!-- Nombre -->
    <div class="input-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#c9a84c" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <input type="text" id="nombreCliente" class="input-field" placeholder="Tu nombre y apellido" maxlength="60" autocomplete="off">
    </div>

    <!-- Fecha -->
    <div class="fecha-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#c9a84c" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <input type="date" id="fechaSeleccionada" class="input-field" style="padding-left:42px;">
    </div>

    <div class="section-label" id="labelHorarios">Horarios disponibles — hoy</div>

    <div class="leyenda">
      <div class="leyenda-item"><span class="leyenda-dot libre"></span>Disponible</div>
      <div class="leyenda-item"><span class="leyenda-dot ocupado"></span>Ocupado</div>
      <div class="leyenda-item"><span class="leyenda-dot almuerzo"></span>Almuerzo</div>
    </div>

    <div id="contenedorHoras">
      <div class="cargando">Cargando turnos…</div>
    </div>

    <button id="btnReservar" onclick="enviarDatos()" disabled>Confirmar Turno</button>

    <a id="btnWhatsapp" href="#" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar cita por WhatsApp
    </a>

    <div id="msgEstado"></div>

    <div class="footer">Chichi Barber &nbsp;·&nbsp; Reservas online</div>
  </div>

</div>

<!-- CARD LISTA DE CITAS DEL DÍA -->
<div class="citas-card">
  <div class="citas-header">
    <span class="citas-titulo">📋 Citas del día</span>
    <span class="citas-badge" id="citasBadge">—</span>
  </div>
  <div id="contenedorCitas">
    <div class="citas-cargando"><span class="spinner-gold"></span>Cargando citas...</div>
  </div>
</div>

<!-- Panel debug oculto — activar con ?debug=1 en la URL -->
<div id="debugPanel"></div>

<script>
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby9MV6DAPhWpax-uPzvCfutxJ01Mg3MZjTnVYaEbIhKyFebkaeYseURZJnLugxOGTGI/exec";
  const CSV_URL    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQX9jO8I1qUAJ3PXGOr1_GeUmLhd3cGiYfMjXC5ZFjo1-qkZPcElNBNsNMGnCYcWhTkCjSZWHN6Ngw/pub?gid=0&single=true&output=csv";
  const WA_NUMERO  = "584246783781";
  const TZ_OFFSET  = -4; // GMT-4 Venezuela

  let horaSeleccionada = "";
  let horasOcupadas    = new Set();
  let fechaActiva      = "";   // "YYYY-MM-DD"
  let todasLasCitas    = [];   // cache del CSV

  const DEBUG = new URLSearchParams(location.search).get('debug') === '1';

  function log(msg) {
    if (!DEBUG) return;
    const p = document.getElementById('debugPanel');
    p.style.display = 'block';
    p.innerHTML += `<div>${msg}</div>`;
  }

  // ── Fecha hoy en GMT-4 → "YYYY-MM-DD" ──
  function fechaHoyLocal() {
    const ahora = new Date();
    const ms    = ahora.getTime() + (TZ_OFFSET * 60 - ahora.getTimezoneOffset()) * 60000;
    return new Date(ms).toISOString().slice(0, 10);
  }

  // ── Convierte cualquier string de fecha a "YYYY-MM-DD" en GMT-4 ──
  function normalizarFecha(str) {
    if (!str || !str.trim()) return null;
    str = str.trim();

    // Intento 1: parsear directo (ISO, RFC, etc.)
    let d = new Date(str);

    // Intento 2: formato "M/D/YYYY" o "M/D/YYYY H:MM:SS" (formato Google Sheets en inglés)
    if (isNaN(d)) {
      const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (m) d = new Date(`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}T00:00:00`);
    }

    // Intento 3: formato "D/M/YYYY" (europeo)
    if (isNaN(d)) {
      const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (m) d = new Date(`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T00:00:00`);
    }

    if (isNaN(d)) {
      log(`⚠️ No se pudo parsear fecha: "${str}"`);
      return null;
    }

    // Ajustar a GMT-4
    const ms = d.getTime() + (TZ_OFFSET * 60 - d.getTimezoneOffset()) * 60000;
    return new Date(ms).toISOString().slice(0, 10);
  }

  // ── Inicializar selector de fecha ──
  function initFecha() {
    const hoy = fechaHoyLocal();
    fechaActiva = hoy;

    const input = document.getElementById('fechaSeleccionada');
    input.value = hoy;
    input.min   = hoy; // no permitir días pasados

    input.addEventListener('change', () => {
      fechaActiva = input.value;
      horaSeleccionada = "";
      document.getElementById('btnReservar').disabled = true;
      setMsg("", "");
      actualizarLabelHorarios();
      renderHorariosConFecha();
      renderCitasDelDia();
    });

    actualizarLabelHorarios();
  }

  function actualizarLabelHorarios() {
    const hoy = fechaHoyLocal();
    const label = document.getElementById('labelHorarios');
    if (fechaActiva === hoy) {
      label.textContent = "Horarios disponibles — hoy";
    } else {
      const [y, m, d] = fechaActiva.split('-');
      const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      const fecha = new Date(`${fechaActiva}T12:00:00`);
      label.textContent = `Horarios — ${dias[fecha.getDay()]} ${d}/${m}/${y}`;
    }
  }

  // ── JSONP: carga horarios del día desde el Apps Script ──
  function respuestaGoogle(data) {
    actualizarBanner(data.atendiendoAhora);
    // Si la fecha activa es hoy, usar datos del script
    const hoy = fechaHoyLocal();
    if (fechaActiva === hoy) {
      renderHorariosDesdeAgenda(data.agenda);
    }
  }

  function actualizarBanner(nombreActual) {
    const banner = document.getElementById('bannerAtencion');
    const label  = document.getElementById('bannerLabel');
    const nombre = document.getElementById('bannerNombre');
    if (nombreActual) {
      banner.className   = "atendiendo";
      label.textContent  = "En este momento se está atendiendo a";
      nombre.textContent = nombreActual;
    } else {
      banner.className   = "disponible";
      label.textContent  = "En este momento";
      nombre.textContent = "CITA DISPONIBLE";
    }
  }

  // ── Armar agenda vacía de 11 AM a 11 PM ──
  function agendaVacia() {
    const agenda = {};
    for (let h = 11; h <= 23; h++) {
      let label;
      if (h < 12)        label = h + " AM";
      else if (h === 12) label = "12 PM";
      else               label = (h - 12) + " PM";
      agenda[label] = { ocupado: false, nombre: "" };
    }
    agenda["2 PM"] = { ocupado: true, motivo: "almuerzo", nombre: "" };
    return agenda;
  }

  // ── Render desde respuesta del Apps Script (hoy) ──
  function renderHorariosDesdeAgenda(agenda) {
    horasOcupadas.clear();
    for (let hora in agenda) {
      if (agenda[hora].ocupado && agenda[hora].motivo !== "almuerzo") {
        horasOcupadas.add(hora);
      }
    }
    renderGrid(agenda);
  }

  // ── Render calculado desde CSV (cualquier fecha) ──
  function renderHorariosConFecha() {
    const agenda = agendaVacia();

    for (const cita of todasLasCitas) {
      if (cita.fecha === fechaActiva && agenda[cita.hora] !== undefined) {
        agenda[cita.hora].ocupado = true;
        agenda[cita.hora].nombre  = cita.nombre;
      }
    }

    horasOcupadas.clear();
    for (let hora in agenda) {
      if (agenda[hora].ocupado && agenda[hora].motivo !== "almuerzo") {
        horasOcupadas.add(hora);
      }
    }

    renderGrid(agenda);
  }

  function renderGrid(agenda) {
    const box = document.getElementById('contenedorHoras');
    box.innerHTML = "";
    let delay = 0;

    for (let hora in agenda) {
      const info       = agenda[hora];
      const esAlmuerzo = info.motivo === "almuerzo";
      const div        = document.createElement('div');
      div.style.animationDelay = delay + "ms";
      delay += 30;

      if (info.ocupado) {
        div.className = "hora-btn ocupado" + (esAlmuerzo ? " almuerzo" : "");
        div.innerHTML = `
          <span class="hora-text">${hora}</span>
          <span class="tag">${esAlmuerzo ? "Almuerzo" : (info.nombre || "Reservado")}</span>
        `;
      } else {
        div.className = "hora-btn";
        div.innerHTML = `<span class="hora-text">${hora}</span>`;
        div.onclick = () => seleccionarHora(hora, div);
      }
      box.appendChild(div);
    }
  }

  function seleccionarHora(hora, el) {
    document.querySelectorAll('.hora-btn').forEach(b => b.classList.remove('seleccionado'));
    el.classList.add('seleccionado');
    horaSeleccionada = hora;
    document.getElementById('btnReservar').disabled = false;
    setMsg("", "");
  }

  // ── Cargar JSONP (hoy) ──
  function cargarScriptHoy() {
    const s = document.createElement('script');
    s.src = URL_SCRIPT + "?callback=respuestaGoogle&t=" + Date.now();
    document.body.appendChild(s);
  }

  // ── Cargar CSV completo ──
  async function cargarCSV() {
    try {
      const res  = await fetch(CSV_URL + "&t=" + Date.now());
      const text = await res.text();
      log("CSV crudo (primeras 500 chars):\n" + text.slice(0, 500));

      const filas = parsearCSV(text);
      log(`Total filas CSV: ${filas.length}`);

      todasLasCitas = [];

      for (let i = 1; i < filas.length; i++) {
        const fila = filas[i];
        if (!fila || fila.length < 3) continue;

        const horaRaw   = fila[0] ? fila[0].trim() : "";
        const nombreRaw = fila[1] ? fila[1].trim() : "";
        const fechaRaw  = fila[2] ? fila[2].trim() : "";

        if (!horaRaw || !nombreRaw || !fechaRaw) continue;

        const fechaNorm = normalizarFecha(fechaRaw);
        log(`Fila ${i}: hora="${horaRaw}" nombre="${nombreRaw}" fecha_raw="${fechaRaw}" → normalizada="${fechaNorm}"`);

        if (fechaNorm) {
          todasLasCitas.push({ hora: horaRaw, nombre: nombreRaw, fecha: fechaNorm });
        }
      }

      log(`Citas cargadas: ${todasLasCitas.length}`);
      log(`Fecha activa: ${fechaActiva}`);
      log(`Citas para hoy: ${todasLasCitas.filter(c => c.fecha === fechaActiva).length}`);

      // Si la fecha activa NO es hoy, renderizar desde CSV
      const hoy = fechaHoyLocal();
      if (fechaActiva !== hoy) {
        renderHorariosConFecha();
      }

      renderCitasDelDia();

    } catch (err) {
      log("Error CSV: " + err.toString());
      document.getElementById('contenedorCitas').innerHTML =
        '<div class="citas-vacio">No se pudo cargar la lista.</div>';
    }
  }

  function parsearCSV(text) {
    const filas = [];
    for (const linea of text.split('\n')) {
      if (!linea.trim()) continue;
      const cols = [];
      let cur = '', enComillas = false;
      for (let i = 0; i < linea.length; i++) {
        const c = linea[i];
        if (c === '"') { enComillas = !enComillas; }
        else if (c === ',' && !enComillas) { cols.push(cur); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur);
      filas.push(cols);
    }
    return filas;
  }

  function horaANumero(hora) {
    const partes = hora.trim().split(' ');
    let h = parseInt(partes[0]);
    const ampm = (partes[1] || '').toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return h;
  }

  function renderCitasDelDia() {
    const contenedor = document.getElementById('contenedorCitas');
    const badge      = document.getElementById('citasBadge');

    const citasHoy = todasLasCitas
      .filter(c => c.fecha === fechaActiva)
      .sort((a, b) => horaANumero(a.hora) - horaANumero(b.hora));

    badge.textContent = citasHoy.length > 0
      ? citasHoy.length + " turno" + (citasHoy.length !== 1 ? "s" : "")
      : "Sin turnos";

    if (citasHoy.length === 0) {
      contenedor.innerHTML = '<div class="citas-vacio">No hay citas registradas para este día.</div>';
      return;
    }

    const ul = document.createElement('ul');
    ul.className = 'citas-lista';
    citasHoy.forEach((c, i) => {
      const li = document.createElement('li');
      li.className = 'cita-item';
      li.style.animationDelay = (i * 40) + 'ms';
      li.innerHTML = `
        <span class="cita-num">${i + 1}</span>
        <span class="cita-hora">${c.hora}</span>
        <span class="cita-nombre">${c.nombre}</span>
      `;
      ul.appendChild(li);
    });

    contenedor.innerHTML = '';
    contenedor.appendChild(ul);
  }

  // ── Envío ──
  async function enviarDatos() {
    const nombre = document.getElementById('nombreCliente').value.trim();
    if (!nombre)           { setMsg("⚠️ Por favor ingresa tu nombre.", "error"); return; }
    if (!horaSeleccionada) { setMsg("⚠️ Selecciona un horario.", "error"); return; }
    if (!fechaActiva)      { setMsg("⚠️ Selecciona una fecha.", "error"); return; }

    // Validación frontend: hora ya ocupada
    if (horasOcupadas.has(horaSeleccionada)) {
      setMsg("⚠️ Ese horario ya está reservado. Elige otro.", "error");
      setTimeout(() => location.reload(), 1800);
      return;
    }

    const btn = document.getElementById('btnReservar');
    btn.innerHTML = '<span class="spinner"></span>Confirmando...';
    btn.disabled = true;
    setMsg("Enviando tu reserva...", "info");

    try {
      await fetch(URL_SCRIPT, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hora: horaSeleccionada, nombre: nombre, fecha: fechaActiva })
      });

      horasOcupadas.add(horaSeleccionada);
      // Actualizar caché local
      todasLasCitas.push({ hora: horaSeleccionada, nombre: nombre, fecha: fechaActiva });

      setMsg("✅ ¡Turno registrado exitosamente!", "ok");
      btn.innerHTML = "✅ Turno confirmado";

      mostrarBotonWhatsapp(nombre, horaSeleccionada, fechaActiva);
      renderCitasDelDia();

    } catch (err) {
      setMsg("❌ Error de conexión. Intenta nuevamente.", "error");
      btn.innerHTML = "Confirmar Turno";
      btn.disabled = false;
    }
  }

  function mostrarBotonWhatsapp(nombre, hora, fecha) {
    const [y, m, d] = fecha.split('-');
    const fechaTexto = `${d}/${m}/${y}`;
    const mensaje = encodeURIComponent(
      `¡Hola Chichi Barber! 💈 Acabo de reservar mi turno:\n\n👤 Nombre: ${nombre}\n📅 Fecha: ${fechaTexto}\n🕐 Hora: ${hora}\n\n¡Allí estaré!`
    );
    const btnWa = document.getElementById('btnWhatsapp');
    btnWa.href = `https://wa.me/${WA_NUMERO}?text=${mensaje}`;
    btnWa.classList.add('visible');
  }

  function setMsg(texto, tipo) {
    const el = document.getElementById('msgEstado');
    el.className = tipo ? tipo + " visible" : "";
    el.innerText = texto;
  }

  // ── Init ──
  window.onload = () => {
    initFecha();
    cargarScriptHoy();   // carga horarios de hoy vía JSONP
    cargarCSV();         // carga todo el CSV para la lista y fechas futuras
  };
</script>

</body>
</html>
